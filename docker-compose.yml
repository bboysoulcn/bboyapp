services:
  app:
    image: bboyapp:latest
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bboyapp:bboyapp@db:5432/bboyapp
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@bboyapp.com}
      SCRAPER_INTERVAL_HOURS: ${SCRAPER_INTERVAL_HOURS:-6}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bboyapp
      POSTGRES_USER: bboyapp
      POSTGRES_PASSWORD: bboyapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bboyapp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
